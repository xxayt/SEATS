# dataset_path: data/ folder from the downloaded HF dataset NJU-LINK/OmniVideoBench, e.g.: xxx/OmniVideoBench/data.parquet
dataset_path: /mnt/sh/mmvision/home/zijiexin/project/OmniQuota/SEATS_refactor_code/data/OmniVideoBench
dataset_kwargs:
  token: True
  cache_dir: /mnt/sh/mmvision/data/videollm/benchmarks/OmniVideoBench  # parent directory of your videos/ folder
  video: True
task: omnivideobench
test_split: test
output_type: generate_until
doc_to_visual: !function utils.omnivideobench_doc_to_visual
doc_to_text: !function utils.omnivideobench_doc_to_text
doc_to_target: "correct_option"
generation_kwargs:
  max_new_tokens: 32
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.omnivideobench_process_results
metric_list:
  - metric: omnivideobench_perception_score
    aggregation: !function utils.omnivideobench_aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer with the option's letter from the given choices directly."