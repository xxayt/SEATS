# dataset_path: data/ folder from the downloaded HF dataset xxayt/LVOmniBench, e.g.: xxx/LVOmniBench/data
dataset_path: /mnt/sh/mmvision/home/zijiexin/project/OmniQuota/SEATS_refactor_code/data/LVOmniBench/data
dataset_kwargs:
  token: True
  cache_dir: /mnt/sh/mmvision/data/videollm/benchmarks/lvomnibench  # parent directory of your videos/ folder
  video: True
task: lvomnibench
test_split: test
output_type: generate_until
doc_to_visual: !function utils.lvomnibench_doc_to_visual
doc_to_text: !function utils.lvomnibench_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 32
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
# The return value of process_results will be used by metrics
process_results: !function utils.lvomnibench_process_results
# Note that the metric name can be either a registed metric function (such as the case for GQA) or a key name returned by process_results
metric_list:
  - metric: lvomnibench_perception_score
    aggregation: !function utils.lvomnibench_aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer with the option's letter from the given choices directly."