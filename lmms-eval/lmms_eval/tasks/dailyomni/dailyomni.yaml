# dataset_path: data/ folder from the downloaded HF dataset xxayt/Daily-Omni, e.g.: xxx/Daily-Omni/data
dataset_path: /mnt/sh/mmvision/home/zijiexin/project/OmniQuota/SEATS_refactor_code/data/Daily-Omni/data
dataset_kwargs:
  token: True
  cache_dir: /mnt/sh/mmvision/data/videollm/benchmarks/DailyOmni  # parent directory of your videos/ folder
  video: True
task: "dailyomni"
test_split: test
output_type: generate_until
doc_to_visual: !function utils.dailyomni_doc_to_visual
doc_to_text: !function utils.dailyomni_doc_to_text
doc_to_target: utils.dailyomni_doc_to_target
generation_kwargs:
  max_new_tokens: 32
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
# The return value of process_results will be used by metrics
process_results: !function utils.dailyomni_process_results
# Note that the metric name can be either a registed metric function (such as the case for GQA) or a key name returned by process_results
metric_list:
  - metric: dailyomni_score
    aggregation: !function utils.dailyomni_aggregate_results
    higher_is_better: true